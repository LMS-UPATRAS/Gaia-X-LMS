version: "3.8"

services:
  lms-vault:
    image: hashicorp/vault:1.15
    container_name: lms-vault
    ports:
      - "8201:8200"
    environment:
      VAULT_ADDR: "http://0.0.0.0:8200"
      VAULT_DEV_ROOT_TOKEN_ID: "root"
    cap_add:
      - IPC_LOCK
    networks:
      - lms-network

  lms-postgres:
    image: postgres:15
    container_name: lms-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: edc
      POSTGRES_PASSWORD: edc
      POSTGRES_DB: edc
    volumes:
      - lms-postgres-data:/var/lib/postgresql/data
    networks:
      - lms-network

  lms-control-plane:
    image: tractusx/edc-control-plane:0.7.3
    container_name: lms-control-plane
    ports:
      - "19191:8181" # API Port
      - "19192:8182" # Management Port
      - "19193:8183" # Protocol Port
    environment:
      EDC_IAM_ISSUER_ID: "did:web:lms-upatras.github.io:Gaia-X-LMS"
      EDC_IAM_JWKS_URL: "https://lms-upatras.github.io/Gaia-X-LMS/did.json"
      EDC_PARTICIPANT_ID: "BPNL000000001LMS"
      EDC_VAULT_HASHICORP_URL: "http://lms-vault:8200"
      EDC_VAULT_HASHICORP_TOKEN: "root"
      web.http.port: 8181
      web.http.path: /api
      web.http.management.port: 8182
      web.http.management.path: /management
      web.http.protocol.port: 8183
      web.http.protocol.path: /protocol
      # Tractus-X specific: BDRS resolution
      TX_EDC_BDRS_SERVER_URL: "http://bdrs:8000"
    depends_on:
      - lms-vault
      - lms-postgres
    networks:
      - lms-network
      - gaia-x-network # Join the shared network to find BDRS

networks:
  lms-network:
    driver: bridge
  gaia-x-network:
    external: true

volumes:
  lms-postgres-data:
